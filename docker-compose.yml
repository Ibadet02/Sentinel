services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
    env_file:
      - .env
    command: npx tsx watch server/src/index.ts
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - sentinel_db_data:/var/lib/postgresql/data

volumes:
  sentinel_db_data:
