name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_dev
          POSTGRES_DB: sentinel_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Generate prisma client
        run: cd server && npx prisma generate

      - name: Run migrations
        run: cd server && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://sentinel:sentinel_dev@localhost:5432/sentinel_db

      - name: Run tests
        run: cd server && pnpm test -- --run
        env:
          DATABASE_URL: postgresql://sentinel:sentinel_dev@localhost:5432/sentinel_db
